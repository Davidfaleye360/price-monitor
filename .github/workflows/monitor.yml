name: Price Monitor Cron
on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Monitor
        env:
          ALERT_EMAIL_USER: ${{ secrets.ALERT_EMAIL_USER }}
          ALERT_EMAIL_PASS: ${{ secrets.ALERT_EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TARGET_PROD_URL: ${{ secrets.TARGET_PROD_URL }}
          PRICE_THRESHOLD: ${{ secrets.PRICE_THRESHOLD }}
        run: python main.py
        
      - name: Commit and Push Price History
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "price_history.csv" ]; then
            git add price_history.csv
            # Commit only if there are changes in staged files
            git diff-index --quiet HEAD || git commit -m "chrono: update price tracking history data log"
            git push
          fi
